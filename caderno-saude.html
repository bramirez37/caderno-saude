<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caderno de Saúde · Bernardo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f0e;--bg2:#141715;--bg3:#1a1d1b;--bg4:#1f2320;
  --b:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.12);--b3:rgba(255,255,255,0.18);
  --t:#e8ede9;--t2:#8a9b8c;--t3:#5a6b5c;
  --g:#4ade80;--gd:rgba(74,222,128,0.1);--gb:rgba(74,222,128,0.25);
  --a:#fbbf24;--ad:rgba(251,191,36,0.1);--ab:rgba(251,191,36,0.25);
  --r:#f87171;--rd:rgba(248,113,113,0.1);--rb:rgba(248,113,113,0.25);
  --bl:#60a5fa;--bld:rgba(96,165,250,0.1);--blb:rgba(96,165,250,0.25);
  --pu:#a78bfa;--pud:rgba(167,139,250,0.1);--pub:rgba(167,139,250,0.25);
  --radius:10px;--rs:6px;
  --fs:14px;
}
/* ── LIGHT MODE ── */
body.light{
  --bg:#f5f6f4;--bg2:#ffffff;--bg3:#eef0ed;--bg4:#e8ebe7;
  --b:rgba(0,0,0,0.08);--b2:rgba(0,0,0,0.14);--b3:rgba(0,0,0,0.22);
  --t:#1a1f1b;--t2:#4a5e4c;--t3:#8a9e8c;
  --g:#16a34a;--gd:rgba(22,163,74,0.08);--gb:rgba(22,163,74,0.22);
  --a:#b45309;--ad:rgba(180,83,9,0.08);--ab:rgba(180,83,9,0.22);
  --r:#dc2626;--rd:rgba(220,38,38,0.08);--rb:rgba(220,38,38,0.22);
  --bl:#1d4ed8;--bld:rgba(29,78,216,0.08);--blb:rgba(29,78,216,0.22);
  --pu:#7c3aed;--pud:rgba(124,58,237,0.08);--pub:rgba(124,58,237,0.22);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;font-size:var(--fs);line-height:1.6;transition:background .2s,color .2s}
.shell{max-width:960px;margin:0 auto;padding:0 24px 100px}

/* ── TOOLBAR ── */
.toolbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:6px 24px;margin:0 -24px 0;
  background:var(--bg);border-bottom:1px solid var(--b);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.toolbar-left{display:flex;align-items:center;gap:6px}
.toolbar-right{display:flex;align-items:center;gap:6px}
.ver{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:.04em;padding:2px 7px;border:1px solid var(--b);border-radius:999px}
.tbtn{padding:4px 9px;border-radius:var(--rs);font-size:11px;cursor:pointer;border:1px solid var(--b2);background:var(--bg3);color:var(--t2);font-family:'DM Mono',monospace;transition:all .15s;white-space:nowrap}
.tbtn:hover{color:var(--t);border-color:var(--b3)}
.tbtn.active{background:var(--gd);color:var(--g);border-color:var(--gb)}
.fs-ctrl{display:flex;align-items:center;gap:3px}
.fs-btn{width:26px;height:26px;border-radius:var(--rs);font-size:13px;cursor:pointer;border:1px solid var(--b2);background:var(--bg3);color:var(--t2);display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'DM Mono',monospace}
.fs-btn:hover{color:var(--t);border-color:var(--b3)}
.theme-btn{width:26px;height:26px;border-radius:var(--rs);font-size:13px;cursor:pointer;border:1px solid var(--b2);background:var(--bg3);color:var(--t2);display:flex;align-items:center;justify-content:center;transition:all .15s}
/* Header */
.hdr{padding:28px 0 18px;border-bottom:1px solid var(--b);margin-bottom:18px}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.hdr h1{font-family:'DM Serif Display',serif;font-size:24px;font-weight:400;letter-spacing:-.5px}
.hdr h1 em{font-style:italic;color:var(--g)}
.hdr-sub{font-size:11px;color:var(--t3);margin-top:3px;font-family:'DM Mono',monospace}
.dot{width:8px;height:8px;border-radius:50%;background:var(--t3);flex-shrink:0;margin-top:8px;transition:background .3s}
.dot.ok{background:var(--g);box-shadow:0 0 8px var(--g)}.dot.err{background:var(--r)}
/* Nav */
.nav{display:flex;gap:2px;margin-bottom:18px;background:var(--bg2);border-radius:var(--radius);padding:4px;border:1px solid var(--b);overflow-x:auto;-webkit-overflow-scrolling:touch}
.nb{flex-shrink:0;padding:6px 11px;font-size:12px;cursor:pointer;border:none;background:none;color:var(--t2);border-radius:var(--rs);font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.nb:hover{color:var(--t)}.nb.active{background:var(--bg3);color:var(--t);border:1px solid var(--b2)}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
@media(max-width:500px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--bg2);border:1px solid var(--b);border-radius:var(--radius);padding:11px 13px}
.sn{font-family:'DM Serif Display',serif;font-size:26px;line-height:1}
.sn.ok{color:var(--g)}.sn.warn{color:var(--a)}.sn.danger{color:var(--r)}
.sl{font-size:10px;color:var(--t3);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
/* Cards */
.card{background:var(--bg2);border:1px solid var(--b);border-radius:var(--radius);padding:15px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--b2)}.card.s{cursor:default}.card.s:hover{border-color:var(--b)}
.ct{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.cbs{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.cd{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);white-space:nowrap}
.cb{font-size:13px;color:var(--t2);line-height:1.5}
.ca{font-size:12px;color:var(--t3);margin-top:4px}.ca::before{content:'→ '}
.cf{display:flex;justify-content:flex-end;margin-top:9px;gap:6px}
/* Badges */
.badge{font-size:11px;padding:2px 8px;border-radius:999px;font-family:'DM Mono',monospace}
.br{background:var(--rd);color:var(--r);border:1px solid var(--rb)}
.ba{background:var(--ad);color:var(--a);border:1px solid var(--ab)}
.bg{background:var(--gd);color:var(--g);border:1px solid var(--gb)}
.bb{background:var(--bld);color:var(--bl);border:1px solid var(--blb)}
.bp{background:var(--pud);color:var(--pu);border:1px solid var(--pub)}
.bz{background:rgba(255,255,255,0.04);color:var(--t3);border:1px solid var(--b)}
/* Pills countdown */
.pc{display:inline-flex;align-items:center;font-size:11px;padding:3px 10px;border-radius:999px;font-family:'DM Mono',monospace}
.pc-a{background:var(--gd);color:var(--g);border:1px solid var(--gb)}
.pc-w{background:var(--ad);color:var(--a);border:1px solid var(--ab)}
.pc-e{background:rgba(255,255,255,0.04);color:var(--t3);border:1px solid var(--b)}
/* Buttons */
.btn{padding:7px 14px;border-radius:var(--rs);font-size:13px;cursor:pointer;border:1px solid var(--b2);background:var(--bg3);color:var(--t);font-family:'DM Sans',sans-serif;transition:all .15s}
.btn:hover{border-color:var(--b3);background:rgba(255,255,255,0.05)}
.btn-p{background:var(--gd);color:var(--g);border-color:var(--gb)}.btn-p:hover{background:rgba(74,222,128,0.16)}
.btn-d{background:var(--rd);color:var(--r);border-color:var(--rb);font-size:11px;padding:3px 10px}
.btn-s{font-size:11px;padding:4px 10px}
.btn-b{background:var(--bld);color:var(--bl);border-color:var(--blb)}
.brow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
/* Form */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:11px}
.fg label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.fg input,.fg select,.fg textarea{padding:8px 10px;border:1px solid var(--b2);border-radius:var(--rs);font-size:13px;background:var(--bg3);color:var(--t);font-family:'DM Sans',sans-serif;width:100%;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--gb)}
.fg select option{background:var(--bg3)}.fg textarea{min-height:64px;resize:vertical}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:500px){.g2,.g3{grid-template-columns:1fr}}
/* Detail rows */
.dr{display:flex;gap:12px;padding:7px 0;border-bottom:1px solid var(--b)}
.dr:last-child{border-bottom:none}
.dk{font-size:11px;color:var(--t3);min-width:120px;flex-shrink:0;text-transform:uppercase;letter-spacing:.06em;padding-top:2px}
.dv{font-size:13px;line-height:1.6;word-break:break-word}
/* Messages */
.msg{font-size:12px;padding:8px 12px;border-radius:var(--rs);margin-bottom:12px;line-height:1.5}
.msg-ok{background:var(--gd);color:var(--g);border:1px solid var(--gb)}
.msg-err{background:var(--rd);color:var(--r);border:1px solid var(--rb)}
.msg-warn{background:var(--ad);color:var(--a);border:1px solid var(--ab)}
/* Filters */
.fr{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.fc{font-size:11px;padding:4px 12px;border-radius:999px;cursor:pointer;border:1px solid var(--b);background:none;color:var(--t2);font-family:'DM Sans',sans-serif;transition:all .15s}
.fc:hover{color:var(--t);border-color:var(--b2)}.fc.active{background:var(--gd);color:var(--g);border-color:var(--gb)}
/* Utils */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--t3);font-size:13px}
.divider{border:none;border-top:1px solid var(--b);margin:14px 0}
.lbl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;margin-top:18px}
.lbl:first-child{margin-top:0}
.mono{background:var(--bg3);border:1px solid var(--b);border-radius:var(--rs);padding:11px;font-family:'DM Mono',monospace;font-size:11px;color:var(--t2);white-space:pre-wrap;word-break:break-all;max-height:220px;overflow-y:auto}
.dbg{background:var(--bg3);border:1px solid var(--b);border-radius:var(--rs);padding:10px;margin-top:10px;font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);white-space:pre-wrap;max-height:180px;overflow-y:auto}
.banner{border-radius:var(--radius);padding:11px 15px;margin-bottom:14px;font-size:13px;display:flex;gap:10px;align-items:center}
.banner-warn{background:var(--ad);border:1px solid var(--ab);color:var(--a)}
.banner-info{background:var(--bld);border:1px solid var(--blb);color:var(--bl)}
.section-head{font-family:'DM Serif Display',serif;font-size:17px;font-weight:400;color:var(--t2);margin-bottom:12px}
/* Summary table */
.stbl{width:100%;border-collapse:collapse;font-size:12px}
.stbl th{text-align:left;padding:6px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);border-bottom:1px solid var(--b);font-weight:400}
.stbl td{padding:7px 8px;border-bottom:1px solid var(--b);color:var(--t2);vertical-align:top}
.stbl tr:last-child td{border-bottom:none}
.stbl tr:hover td{background:rgba(255,255,255,0.02)}
body.light .stbl tr:hover td{background:rgba(0,0,0,0.02)}
body.light .fg select option{background:#fff;color:#1a1f1b}
body.light .mono,body.light .dbg{color:var(--t2)}
body.light .card:hover{border-color:var(--b2)}
body.light .bz{background:rgba(0,0,0,0.04)}
</style>
</head>
<body>
<div class="toolbar">
  <div class="toolbar-left">
    <span class="ver">v2.1</span>
    <div class="dot" id="dot" style="margin-top:0;flex-shrink:0"></div>
  </div>
  <div class="toolbar-right">
    <div class="fs-ctrl">
      <button class="fs-btn" onclick="changeFontSize(-1)" title="Reduzir letra">A−</button>
      <button class="fs-btn" onclick="changeFontSize(0)" title="Tamanho padrão" style="font-size:10px">A</button>
      <button class="fs-btn" onclick="changeFontSize(1)" title="Aumentar letra">A+</button>
    </div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Modo claro/escuro">🌙</button>
  </div>
</div>
<div class="shell">
  <div class="hdr">
    <div class="hdr-top">
      <div>
        <h1>Caderno de <em>Saúde</em></h1>
        <div class="hdr-sub">bernardo · diabetes tipo 1 · medtronic 780g</div>
      </div>
    </div>
  </div>
  <div id="msg-g"></div>
  <div id="banners"></div>
  <div class="stats">
    <div class="stat"><div class="sn" id="s-inc">—</div><div class="sl">Incidentes</div></div>
    <div class="stat"><div class="sn" id="s-glu">—</div><div class="sl">Glicemia</div></div>
    <div class="stat"><div class="sn" id="s-med">—</div><div class="sl">Medicação</div></div>
    <div class="stat"><div class="sn" id="s-hba">—</div><div class="sl">HbA1c</div></div>
  </div>
  <div class="nav">
    <button class="nb active" onclick="goTab('dashboard')">Dashboard</button>
    <button class="nb" onclick="goTab('incidentes')">Incidentes</button>
    <button class="nb" onclick="goTab('glicemia')">Glicemia</button>
    <button class="nb" onclick="goTab('episodios')">Episódios</button>
    <button class="nb" onclick="goTab('historico')">Historial</button>
    <button class="nb" onclick="goTab('equipamento')">Equipamento</button>
    <button class="nb" onclick="goTab('consultas')">Consultas</button>
    <button class="nb" onclick="goTab('medicacao')">Medicação</button>
    <button class="nb" onclick="goTab('perfil')">Perfil</button>
    <button class="nb" onclick="goTab('importar')">Importar</button>
    <button class="nb" onclick="goTab('exportar')">Exportar</button>
  </div>
  <div id="tab-dashboard"></div>
  <div id="tab-incidentes" style="display:none"></div>
  <div id="tab-glicemia" style="display:none"></div>
  <div id="tab-episodios" style="display:none"></div>
  <div id="tab-historico" style="display:none"></div>
  <div id="tab-equipamento" style="display:none"></div>
  <div id="tab-consultas" style="display:none"></div>
  <div id="tab-medicacao" style="display:none"></div>
  <div id="tab-perfil" style="display:none"></div>
  <div id="tab-importar" style="display:none"></div>
  <div id="tab-exportar" style="display:none"></div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SB='https://faehcnkslekyhewbsckc.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhZWhjbmtzbGVreWhld2JzY2tjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTEyMTAsImV4cCI6MjA4OTIyNzIxMH0.1DJnrbs1v4qc7bRnpFR8cNdWyjAnqRZ_rKab3SS9a8U';
const H={'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK,'Prefer':'return=representation'};
const HU={...H,'Prefer':'resolution=merge-duplicates,return=representation'};

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const ITYPES=["Hipoglicemia","Hiperglicemia","Dor aguda","Tontura/desmaio","Reação adversa","Crise de pressão","Problema cardíaco","Reação alérgica","Outro"];
const SEVL={1:"Leve",2:"Moderado",3:"Grave"};
const SEVB={1:"bg",2:"ba",3:"br"};
const TYPB={"Hipoglicemia":"br","Hiperglicemia":"ba","Dor aguda":"br","Tontura/desmaio":"ba","Reação adversa":"ba","Crise de pressão":"br","Problema cardíaco":"br","Reação alérgica":"ba","Outro":"bb"};
const EQP_TYPES=['sensor','bomba','reservatório','cateter','outro'];
const EQP_EVTS=['troca','falha','alarme','calibração','outro'];
const LAST_BACKUP_KEY='caderno_last_backup';

// ─── STATE ────────────────────────────────────────────────────────────────────
let DB={incidents:[],glucose:[],equipment:[],appointments:[],med_base:[],med_temp:[],episodes:[],history:[],profile:null};
let curTab='dashboard',detId=null,formOpen=null,incF=0,sumMode=20;

// ─── API ──────────────────────────────────────────────────────────────────────
async function sbGet(t,o='created_at.desc',extra=''){
  const r=await fetch(`${SB}/rest/v1/${t}?order=${o}${extra}`,{headers:H});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbUp(t,d){
  const r=await fetch(`${SB}/rest/v1/${t}`,{method:'POST',headers:HU,body:JSON.stringify(d)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbPatch(t,id,d){
  const r=await fetch(`${SB}/rest/v1/${t}?id=eq.${encodeURIComponent(id)}`,{method:'PATCH',headers:HU,body:JSON.stringify(d)});
  if(!r.ok)throw new Error(await r.text());
}
async function sbDel(t,id){
  const r=await fetch(`${SB}/rest/v1/${t}?id=eq.${encodeURIComponent(id)}`,{method:'DELETE',headers:H});
  if(!r.ok)throw new Error(await r.text());
}

// ─── ROW MAPS ─────────────────────────────────────────────────────────────────
function toIR(i){return{id:i.id,date:i.date,time:i.time||null,end_date:i.endDate||null,end_time:i.endTime||null,type:i.type,type_custom:i.typeCustom||null,severity:i.severity,sensor_active:i.sensorActive??null,glucose_at_event:i.glucoseAtEvent||null,ketones:i.ketones||null,location:i.location||null,trigger:i.trigger||null,sick_day:i.sickDay||false,symptoms:i.symptoms||null,action:i.action||null,recovery_time:i.recoveryTime||null,medication_note:i.medicationNote||null,notes:i.notes||null};}
function fromIR(r){return{id:r.id,date:r.date,time:r.time||'',endDate:r.end_date||'',endTime:r.end_time||'',type:r.type,typeCustom:r.type_custom||'',severity:r.severity,sensorActive:r.sensor_active,glucoseAtEvent:r.glucose_at_event,ketones:r.ketones||'',location:r.location||'',trigger:r.trigger||'',sickDay:r.sick_day||false,symptoms:r.symptoms||'',action:r.action||'',recoveryTime:r.recovery_time||'',medicationNote:r.medication_note||'',notes:r.notes||''};}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function uid(p='id'){return p+'-'+Date.now()+'-'+Math.random().toString(36).slice(2,5);}
function today(){return new Date().toISOString().slice(0,10);}
function nowT(){return new Date().toTimeString().slice(0,5);}
function fmtD(d){if(!d)return'';try{return new Date(d+'T12:00').toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit',year:'numeric'});}catch{return d;}}
function fmtDT(d){if(!d)return'';try{return new Date(d).toLocaleString('pt-PT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}catch{return d;}}
function gc(v){if(!v&&v!==0)return'';if(v<70)return'danger';if(v>180)return'warn';return'ok';}
function gb(v){if(!v&&v!==0)return'bz';if(v<70)return'br';if(v>180)return'ba';return'bg';}
function dl(e){if(!e)return null;return Math.ceil((new Date(e+' 23:59')-new Date())/86400000);}
function duration(d1,t1,d2,t2){
  if(!d1)return'';
  if(!d2)return'';
  const a=new Date((d1+(t1?' '+t1:' 00:00')));
  const b=new Date((d2+(t2?' '+t2:' 00:00')));
  const diff=b-a;
  if(diff<0)return'';
  const h=Math.floor(diff/3600000);
  const days=Math.floor(diff/86400000);
  if(days>=1)return days+' dia'+(days!==1?'s':'');
  if(h>=1)return h+' hora'+(h!==1?'s':'');
  return Math.floor(diff/60000)+' min';
}
function setDot(s){const d=document.getElementById('dot');d.className='dot'+(s==='ok'?' ok':s==='err'?' err':'');}
function flash(t,tp='ok'){const e=document.getElementById('msg-g');e.innerHTML=`<div class="msg msg-${tp}">${t}</div>`;setTimeout(()=>e.innerHTML='',4000);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ─── LOAD ─────────────────────────────────────────────────────────────────────
async function loadAll(){
  setDot('loading');
  try{
    const[inc,glu,eqp,apt,mb,mt,ep,hist,prof]=await Promise.all([
      sbGet('medical_incidents','date.desc,time.desc'),
      sbGet('glucose_readings','datetime.desc'),
      sbGet('equipment_log','date.desc,time.desc'),
      sbGet('medical_appointments','date.desc'),
      sbGet('medications_baseline','created_at.desc'),
      sbGet('medications_temporary','start_date.desc'),
      sbGet('hospital_episodes','date_in.desc'),
      sbGet('medical_history','date.desc'),
      sbGet('medical_profile','updated_at.desc'),
    ]);
    DB.incidents=inc.map(fromIR);
    DB.glucose=glu;DB.equipment=eqp;DB.appointments=apt;
    DB.med_base=mb;DB.med_temp=mt;DB.episodes=ep;DB.history=hist;
    DB.profile=prof[0]||null;
    setDot('ok');
    renderStats();renderBanners();renderCurrent();
  }catch(e){setDot('err');flash('Erro Supabase: '+e.message,'err');}
}

function renderStats(){
  document.getElementById('s-inc').textContent=DB.incidents.length;
  const lg=DB.glucose[0];const ge=document.getElementById('s-glu');
  if(lg){ge.textContent=lg.value_mgdl;ge.className='sn '+gc(lg.value_mgdl);}
  else{ge.textContent='—';ge.className='sn';}
  const am=DB.med_temp.filter(m=>{const d=dl(m.end_date);return d===null||d>=0;}).length;
  document.getElementById('s-med').textContent=am||'—';
  const la=DB.appointments.find(a=>a.hba1c);
  document.getElementById('s-hba').textContent=la?la.hba1c+'%':'—';
}

function renderBanners(){
  const el=document.getElementById('banners');
  const parts=[];
  if(DB.incidents.find(i=>i.sickDay&&i.date===today())){
    parts.push(`<div class="banner banner-warn">⚠ Sick day ativo hoje — resistência à insulina aumentada. Verifica basal.</div>`);
  }
  const lb=localStorage.getItem(LAST_BACKUP_KEY);
  if(lb){const d=Math.floor((Date.now()-parseInt(lb))/86400000);if(d>7)parts.push(`<div class="banner banner-info">💾 Último backup há ${d} dias. Considera exportar.</div>`);}
  else if(DB.incidents.length>0){parts.push(`<div class="banner banner-info">💾 Sem backup registado. Exporta os teus dados.</div>`);}
  const ending=DB.med_temp.filter(m=>{const d=dl(m.end_date);return d!==null&&d>=0&&d<=2;});
  ending.forEach(m=>parts.push(`<div class="banner banner-warn">⏳ ${esc(m.name)} termina ${dl(m.end_date)===0?'hoje':dl(m.end_date)===1?'amanhã':'em 2 dias'}.</div>`));
  el.innerHTML=parts.join('');
}

function goTab(name){

  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));

}

function incCard(i,compact){
  const lbl=i.type==='Outro'&&i.typeCustom?i.typeCustom:i.type;

  return`<div class="card" onclick="goTab('incidentes');openDetail('${i.id}')">
    <div class="ct"><div class="cbs">
      <span class="badge ${TYPB[i.type]||'bb'}">${esc(lbl)}</span>
      <span class="badge ${SEVB[i.severity]}">${SEVL[i.severity]}</span>
      ${i.sickDay?'<span class="badge ba">sick day</span>':''}
      ${i.sensorActive===false?'<span class="badge bz">sem sensor</span>':''}
      ${i.glucoseAtEvent?`<span class="badge ${gb(i.glucoseAtEvent)}">${i.glucoseAtEvent} mg/dL</span>`:''}
      ${dur?`<span class="badge bz">${dur}</span>`:''}

}

function exportSummary(){
  const items=DB.incidents.slice(0,sumMode);
  const h='Data,Hora,Tipo,Gravidade,Glicemia,Acetonas,Sick Day,Duração,Sintomas,Ação,Recuperação,Notas';
  const rows=items.map(i=>{
    const dur=duration(i.date,i.time,i.endDate,i.endTime);
    const lbl=i.type==='Outro'&&i.typeCustom?i.typeCustom:i.type;
    return[i.date,i.time,lbl,SEVL[i.severity],i.glucoseAtEvent||'',i.ketones||'',i.sickDay?'Sim':'',dur||i.recoveryTime||'',i.symptoms,i.action,i.recoveryTime,i.notes].map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',');
  });
  const csv=h+'\n'+rows.join('\n');
  const b=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`incidentes-${today()}.csv`;a.click();
}

    <div id="msg-imp"></div>
    <div id="preview-imp"></div>
    <textarea id="ji" style="width:100%;min-height:200px;padding:10px;border:1px solid var(--b2);border-radius:var(--rs);background:var(--bg3);color:var(--t);font-family:'DM Mono',monospace;font-size:11px;resize:vertical" placeholder='Cole aqui o JSON do Claude...'></textarea>
    <div class="brow" style="margin-top:10px">
      <button class="btn btn-p" onclick="previewImport()">Preview</button>
      <button class="btn btn-b" id="btn-confirm-import" style="display:none" onclick="confirmImport()">✓ Confirmar importação</button>
      <button class="btn" onclick="document.getElementById('ji').value='';document.getElementById('preview-imp').innerHTML='';document.getElementById('btn-confirm-import').style.display='none'">Limpar</button>

    "trigger":"doença","symptoms":"...","action":"...","medicationNote":"basal +30%"}],
  "glicemias": [{"datetime":"2026-03-20T14:00:00","value_mgdl":310,"context":"sick-day","source":"picada"}],
  "equipamento": [{"date":"2026-03-20","equipment_type":"sensor","event_type":"troca","equipment_model":"Guardian 4","notes":"..."}],
  "episodiosHospitalares": [{"date_in":"2026-03-20","date_out":"2026-03-21",
    "hospital":"Hospital La Paz","service":"ORL","episode_type":"urgente",
    "diagnosis":"Flemão periamigdalino esquerdo","glucose_at_admission":373,"hba1c_at_admission":7.5}],
  "historico": [{"date":"2023-10-27","diagnosis":"Retinopatia diabética","status":"em-seguimento","source":"SNS"}],
  "medicacaoTemporaria": [{"name":"Amoxicilina-clavulânico","dose":"875/125mg",
    "frequency":"1 comp. 8/8h","start_date":"2026-03-21","duration_days":10,

let pendingImport=null;

function previewImport(){
  const raw=document.getElementById('ji').value.trim();
  const preEl=document.getElementById('preview-imp');
  const msgEl=document.getElementById('msg-imp');
  const dbgEl=document.getElementById('dbg-imp');
  preEl.innerHTML='';msgEl.innerHTML='';dbgEl.innerHTML='';
  document.getElementById('btn-confirm-import').style.display='none';
  if(!raw){msgEl.innerHTML='<div class="msg msg-err">Cola o JSON primeiro.</div>';return;}

  const blocks=raw.split(/\n\s*\n/).map(b=>b.trim()).filter(b=>b.startsWith('{')&&b.endsWith('}'));
  const jsons=blocks.length>1?blocks:[raw];

  let counts={incidentes:0,glicemias:0,equipamento:0,episodios:0,historico:0,consultas:0,medTemp:0};
  let parsed=[];
  let erros=[];

  for(const j of jsons){
    try{
      const p=JSON.parse(j);
      parsed.push(p);
      if(Array.isArray(p)){p.forEach(item=>{if(item.date&&item.type)counts.incidentes++;});}
      else{
        if(p.incidentes)counts.incidentes+=p.incidentes.length;
        if(p.incidents)counts.incidentes+=p.incidents.length;
        if(p.glicemias)counts.glicemias+=p.glicemias.length;
        if(p.glucose)counts.glicemias+=p.glucose.length;
        if(p.equipamento)counts.equipamento+=p.equipamento.length;
        if(p.equipment_log)counts.equipamento+=p.equipment_log.length;
        if(p.episodiosHospitalares)counts.episodios+=p.episodiosHospitalares.length;
        if(p.hospital_episodes)counts.episodios+=p.hospital_episodes.length;
        if(p.historico)counts.historico+=p.historico.length;
        if(p.medical_history)counts.historico+=p.medical_history.length;
        if(p.consultas)counts.consultas+=p.consultas.length;
        if(p.medicacaoTemporaria)counts.medTemp+=p.medicacaoTemporaria.length;
        if(p.date&&p.type){counts.incidentes++;}
      }
    }catch(e){erros.push('Bloco inválido: '+e.message);}
  }

  pendingImport=parsed;
  const total=Object.values(counts).reduce((a,b)=>a+b,0);
  if(total===0&&erros.length===0){msgEl.innerHTML='<div class="msg msg-warn">Nenhum registo reconhecido. Verifica o formato.</div>';return;}

  const lines=Object.entries({Incidentes:counts.incidentes,Glicemias:counts.glicemias,Equipamento:counts.equipamento,'Episódios hospitalares':counts.episodios,Historial:counts.historico,Consultas:counts.consultas,'Medicação temporária':counts.medTemp}).filter(([,v])=>v>0).map(([k,v])=>`<div class="dr"><div class="dk">${k}</div><div class="dv" style="color:var(--g)">${v} registos</div></div>`).join('');

  preEl.innerHTML=`<div class="card s" style="margin-bottom:12px">
    <div style="font-size:13px;font-weight:500;margin-bottom:10px;color:var(--g)">Preview — ${total} registos a importar</div>
    ${lines}
    ${erros.length?`<div style="font-size:12px;color:var(--r);margin-top:8px">${erros.join('<br>')}</div>`:''}
  </div>`;
  document.getElementById('btn-confirm-import').style.display='inline-block';
}

async function confirmImport(){
  if(!pendingImport){return;}
  const dbgEl=document.getElementById('dbg-imp');
  const msgEl=document.getElementById('msg-imp');
  let saved=0,erros=[];

  for(const p of pendingImport){
    // Incidentes
    let il=[];
    if(Array.isArray(p))il=p.filter(x=>x.date&&x.type);
    else if(p.date&&p.type)il=[p];
    else{il=[...(p.incidentes||[]),(p.incidents||[])];}

    for(const item of il){
      if(!item.date||!item.type)continue;
      let sa=item.sensorActive??item.sensor_active;
      if(sa==='true'||sa===true)sa=true;else if(sa==='false'||sa===false)sa=false;else sa=null;
      try{await sbUp('medical_incidents',toIR({id:item.id||uid('inc'),date:item.date,time:item.time||'',endDate:item.endDate||item.end_date||'',endTime:item.endTime||item.end_time||'',type:ITYPES.includes(item.type)?item.type:'Outro',typeCustom:item.typeCustom||item.type_custom||'',severity:[1,2,3].includes(parseInt(item.severity))?parseInt(item.severity):1,sensorActive:sa,glucoseAtEvent:item.glucoseAtEvent||item.glucose_at_event||null,ketones:item.ketones||'',location:item.location||'',trigger:item.trigger||'',sickDay:item.sickDay||item.sick_day||false,symptoms:item.symptoms||'',action:item.action||'',recoveryTime:item.recoveryTime||item.recovery_time||'',medicationNote:item.medicationNote||item.medication_note||'',notes:item.notes||''}));saved++;}
      catch(e){erros.push('Inc: '+e.message);}
    }

    // Glicemias
    for(const g of(p.glicemias||p.glucose||[])){
      if(!g.datetime&&!g.value_mgdl)continue;
      try{const dt=g.datetime?new Date(g.datetime).toISOString():new Date().toISOString();await sbUp('glucose_readings',{id:g.id||uid('glu'),datetime:dt,value_mgdl:parseInt(g.value_mgdl),context:g.context||null,source:g.source||null,sensor_model:g.sensor_model||null,notes:g.notes||null,incident_id:g.incident_id||null});saved++;}
      catch(e){erros.push('Glu: '+e.message);}
    }

    // ── BUG #1 FIX: Equipamento ──────────────────────────────────────────────
    for(const e of(p.equipamento||p.equipment_log||[])){
      if(!e.date)continue;
      try{await sbUp('equipment_log',{
        id:e.id||uid('eqp'),
        date:e.date,
        time:e.time||null,
        equipment_type:EQP_TYPES.includes(e.equipment_type)?e.equipment_type:'outro',
        equipment_model:e.equipment_model||null,
        event_type:EQP_EVTS.includes(e.event_type)?e.event_type:'outro',
        notes:e.notes||null
      });saved++;}
      catch(e2){erros.push('Eqp: '+e2.message);}
    }

    // Episódios hospitalares
    for(const e of(p.episodiosHospitalares||p.hospital_episodes||[])){
      if(!e.date_in&&!e.dateIn)continue;
      try{await sbUp('hospital_episodes',{id:e.id||uid('ep'),date_in:e.date_in||e.dateIn,time_in:e.time_in||e.timeIn||null,date_out:e.date_out||e.dateOut||null,time_out:e.time_out||e.timeOut||null,hospital:e.hospital||'',service:e.service||null,doctor:e.doctor||null,episode_type:e.episode_type||e.episodeType||'urgente',reason_in:e.reason_in||e.reasonIn||null,diagnosis:e.diagnosis||null,glucose_at_admission:e.glucose_at_admission||e.glucoseAtAdmission||null,hba1c_at_admission:e.hba1c_at_admission||e.hba1cAtAdmission||null,procedures:e.procedures||null,evolution:e.evolution||null,discharge_notes:e.discharge_notes||e.dischargeNotes||null,notes:e.notes||null});saved++;}
      catch(e2){erros.push('Ep: '+e2.message);}
    }

    // Historial
    for(const h of(p.historico||p.medical_history||[])){
      if(!h.date||!h.diagnosis)continue;
      try{await sbUp('medical_history',{id:h.id||uid('hi'),date:h.date,diagnosis:h.diagnosis,status:h.status||'ativo',source:h.source||'outro',specialty:h.specialty||null,notes:h.notes||null});saved++;}
      catch(e){erros.push('Hist: '+e.message);}
    }

    // Consultas
    for(const a of(p.consultas||p.appointments||[])){
      if(!a.date)continue;
      try{await sbUp('medical_appointments',{id:a.id||uid('apt'),date:a.date,specialty:a.specialty||'outro',doctor:a.doctor||null,hospital:a.hospital||a.location||null,hba1c:a.hba1c||null,notes:a.notes||null,next_appointment:a.next_appointment||a.nextAppointment||null});saved++;}
      catch(e){erros.push('Apt: '+e.message);}
    }

    // Medicação temporária
    for(const m of(p.medicacaoTemporaria||p.medications_temporary||[])){
      if(!m.name||!m.start_date)continue;
      let end=m.end_date;
      if(!end&&m.duration_days&&m.start_date){const d=new Date(m.start_date);d.setDate(d.getDate()+parseInt(m.duration_days)-1);end=d.toISOString().slice(0,10);}
      try{await sbUp('medications_temporary',{id:m.id||uid('mt'),name:m.name,dose:m.dose||null,unit:m.unit||null,frequency:m.frequency||null,start_date:m.start_date,end_date:end||null,duration_days:m.duration_days||null,reason:m.reason||null,notes:m.notes||null});saved++;}
      catch(e){erros.push('Med: '+e.message);}
    }
  }

  dbgEl.innerHTML=`<div class="dbg">Guardados: ${saved}\nErros: ${erros.length}${erros.length?'\n\n'+erros.join('\n'):''}</div>`;
  document.getElementById('ji').value='';
  document.getElementById('preview-imp').innerHTML='';
  document.getElementById('btn-confirm-import').style.display='none';
  pendingImport=null;
  await loadAll();
  msgEl.innerHTML=`<div class="msg msg-ok">${saved} registo(s) importado(s) com sucesso.${erros.length?' ('+erros.length+' erro(s).)':''}</div>`;
}

async function doExport(){
  const payload={exportedAt:new Date().toISOString(),version:'2.0',incidentes:DB.incidents,glicemias:DB.glucose,equipamento:DB.equipment,episodiosHospitalares:DB.episodes,historico:DB.history,consultas:DB.appointments,medicacaoCronica:DB.med_base,medicacaoTemporaria:DB.med_temp,perfil:DB.profile};
  const b=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`caderno-saude-backup-${today()}.json`;a.click();
  localStorage.setItem(LAST_BACKUP_KEY,Date.now().toString());
  renderBanners();
  flash('Backup exportado com sucesso.','ok');
}

// ─── THEME AND FONT SIZE ──────────────────────────────────────────────────────
const FONT_SIZES=[12,13,14,15,16,18];
let currentFontIdx=2;

function applyFontSize(idx){
  currentFontIdx=Math.max(0,Math.min(FONT_SIZES.length-1,idx));
  // BUG #2 FIX: usar '--fs' (dois hífens) em vez de '–fs' (en dash)
  document.documentElement.style.setProperty('--fs',FONT_SIZES[currentFontIdx]+'px');
  localStorage.setItem('caderno_fontsize',currentFontIdx);
}

function changeFontSize(dir){
  if(dir===0)applyFontSize(2);
  else applyFontSize(currentFontIdx+dir);
}

function toggleTheme(){
  const isLight=document.body.classList.toggle('light');
  document.getElementById('theme-btn').textContent=isLight?'☀️':'🌙';
  localStorage.setItem('caderno_theme',isLight?'light':'dark');
}

function initPrefs(){
  const t=localStorage.getItem('caderno_theme');
  if(t==='light'){document.body.classList.add('light');document.getElementById('theme-btn').textContent='☀️';}
  const f=localStorage.getItem('caderno_fontsize');
  if(f!==null)applyFontSize(parseInt(f));
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
initPrefs();
loadAll();
